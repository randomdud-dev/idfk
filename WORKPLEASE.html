
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>System Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    overflow-x:hidden;
}

#bgDots{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-1;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

#topBar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(10px);
    position:sticky;
    top:0;
    z-index:20;
}

#tabs{
    display:flex;
    gap:10px;
}

button{
    border:none;
    padding:12px 18px;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#3b82f6;
}

.card{
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
    backdrop-filter:blur(12px);
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.info-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    gap:20px;
}

.hidden{
    display:none;
}

iframe{
    width:100%;
    height:400px;
    border:none;
    border-radius:14px;
}

#fpsCounter{
    font-size:1rem;
    font-weight:bold;
    color:#60a5fa;
}

#aimCanvas{
    width:100%;
    height:500px;
    min-height:500px;
    background:rgba(0,0,0,.25);
    border-radius:12px;
    margin-top:20px;
    display:block;
    cursor:crosshair;
}

#micCanvas{
    width:100%;
    height:120px;
    background:rgba(0,0,0,.25);
    border-radius:12px;
}

</style>
</head>

<body>

<canvas id="bgDots"></canvas>

<div id="topBar">

<div id="tabs">
    <button onclick="showTab('system')">
        SYSTEM
    </button>

    <button onclick="showTab('comp')">
        COMP
    </button>
</div>

<div id="fpsCounter">
    FPS: 0
</div>

</div>

<div id="systemTab" class="container">

<h1>System Dashboard</h1>

<div class="card">

<h2>Microphone Visualizer</h2>

<canvas id="micCanvas"></canvas>

</div>

<div class="grid">

<div class="card">

<h2>System Information</h2>

<div id="systemInfo"></div>

</div>

<div class="card">

<h2>Location</h2>

<div id="locationInfo">
Loading...
</div>

<button onclick="getPreciseLocation()">
Precise Location
</button>

</div>

</div>

<div class="card">

<h2>Map</h2>

<iframe id="map"></iframe>

</div>

</div>

<div id="compTab"
class="container hidden">

<h1>Competitive Features</h1>

<div class="card">

<button onclick="startReactionTest()">
Reaction Test
</button>

<button onclick="startAimTrainer()">
Aim Trainer
</button>

<div id="scoreBoard"
style="margin-top:20px">
</div>

<canvas id="aimCanvas"></canvas>

</div>

</div>

<script>

/* TABS */

function showTab(tab){

    document.getElementById(
        "systemTab"
    ).classList.add("hidden");

    document.getElementById(
        "compTab"
    ).classList.add("hidden");

    if(tab === "system"){

        document.getElementById(
            "systemTab"
        ).classList.remove("hidden");
    }

    if(tab === "comp"){

        document.getElementById(
            "compTab"
        ).classList.remove("hidden");

        setTimeout(resizeAimCanvas,100);
    }
}

/* SYSTEM INFO */

function addRow(label,value){

    return `
    <div class="info-row">
        <span>${label}</span>
        <span>${value}</span>
    </div>
    `;
}

function loadSystemInfo(){

    let html = "";

    html += addRow(
        "OS",
        navigator.platform
    );

    html += addRow(
        "Language",
        navigator.language
    );

    html += addRow(
        "Screen",
        `${screen.width}x${screen.height}`
    );

    html += addRow(
        "CPU Threads",
        navigator.hardwareConcurrency
    );

    html += addRow(
        "RAM Estimate",
        navigator.deviceMemory + " GB"
    );

    document.getElementById(
        "systemInfo"
    ).innerHTML = html;
}

loadSystemInfo();

/* LOCATION */

async function loadLocation(){

    try{

        const res =
        await fetch(
            "https://ipapi.co/json"
        );

        const data =
        await res.json();

        document.getElementById(
            "locationInfo"
        ).innerHTML = `

            ${data.city}<br>
            ${data.region}<br>
            ${data.country_name}<br>
            ${data.ip}
        `;

        document.getElementById(
            "map"
        ).src =

        `https://maps.google.com/maps?q=${data.latitude},${data.longitude}&z=12&output=embed`;

    }catch{

        document.getElementById(
            "locationInfo"
        ).innerHTML =
        "Location failed";
    }
}

loadLocation();

function getPreciseLocation(){

    navigator.geolocation
    .getCurrentPosition(pos=>{

        const lat =
        pos.coords.latitude;

        const lon =
        pos.coords.longitude;

        document.getElementById(
            "locationInfo"
        ).innerHTML = `

            ${lat}<br>
            ${lon}
        `;

        document.getElementById(
            "map"
        ).src =

        `https://maps.google.com/maps?q=${lat},${lon}&z=14&output=embed`;
    });
}

/* FPS COUNTER */

let lastFrame =
performance.now();

let frames = 0;

function updateFPS(){

    frames++;

    const now =
    performance.now();

    if(now >= lastFrame + 1000){

        document.getElementById(
            "fpsCounter"
        ).innerText =

        `FPS: ${frames}`;

        frames = 0;

        lastFrame = now;
    }

    requestAnimationFrame(
        updateFPS
    );
}

updateFPS();

/* MIC VISUALIZER */

const micCanvas =
document.getElementById(
    "micCanvas"
);

const micCtx =
micCanvas.getContext("2d");

micCanvas.width =
micCanvas.offsetWidth;

micCanvas.height = 120;

async function startMic(){

    try{

        const stream =
        await navigator.mediaDevices
        .getUserMedia({audio:true});

        const audioCtx =
        new AudioContext();

        const analyser =
        audioCtx.createAnalyser();

        const source =
        audioCtx.createMediaStreamSource(
            stream
        );

        source.connect(analyser);

        analyser.fftSize = 256;

        const bufferLength =
        analyser.frequencyBinCount;

        const dataArray =
        new Uint8Array(bufferLength);

        function drawMic(){

            requestAnimationFrame(
                drawMic
            );

            analyser.getByteFrequencyData(
                dataArray
            );

            micCtx.clearRect(
                0,
                0,
                micCanvas.width,
                micCanvas.height
            );

            const barWidth =
            micCanvas.width /
            bufferLength;

            let x = 0;

            for(let i=0;i<bufferLength;i++){

                const barHeight =
                dataArray[i];

                micCtx.fillStyle =
                `rgb(${barHeight},120,255)`;

                micCtx.fillRect(
                    x,
                    micCanvas.height
                    - barHeight/2,
                    barWidth-1,
                    barHeight/2
                );

                x += barWidth;
            }
        }

        drawMic();

    }catch(e){

        console.log(e);
    }
}

startMic();

/* REACTION TEST */

let reactionStart = 0;

function startReactionTest(){

    const board =
    document.getElementById(
        "scoreBoard"
    );

    board.innerHTML = `

    <div id="reactionBox"
    style="
        margin-top:20px;
        padding:60px;
        background:red;
        text-align:center;
        border-radius:12px;
        cursor:pointer;
        font-size:1.3rem;
    ">
        WAIT...
    </div>
    `;

    const box =
    document.getElementById(
        "reactionBox"
    );

    const delay =
    1000 + Math.random() * 3000;

    setTimeout(()=>{

        box.style.background =
        "green";

        box.innerHTML =
        "CLICK";

        reactionStart =
        Date.now();

        box.onclick = ()=>{

            const time =
            Date.now()
            - reactionStart;

            board.innerHTML = `

                Reaction:
                ${time}ms

                <canvas
                id="graph"
                width="500"
                height="200"
                style="
                    margin-top:20px;
                    width:100%;
                    background:
                    rgba(255,255,255,.05);
                    border-radius:12px;
                ">
                </canvas>
            `;

            drawGraph(time);
        };

    },delay);
}

function drawGraph(value){

    const canvas =
    document.getElementById(
        "graph"
    );

    if(!canvas) return;

    const c =
    canvas.getContext("2d");

    c.beginPath();

    c.moveTo(0,180);

    c.lineTo(120,120);

    c.lineTo(250,
    200 - value/2);

    c.lineTo(500,100);

    c.strokeStyle =
    "#3b82f6";

    c.lineWidth = 4;

    c.stroke();
}

/* AIM TRAINER */

const aimCanvas =
document.getElementById(
    "aimCanvas"
);

const aimCtx =
aimCanvas.getContext("2d");

let targets = [];

let running = false;

function resizeAimCanvas(){

    aimCanvas.width =
    aimCanvas.offsetWidth;

    aimCanvas.height = 500;
}

resizeAimCanvas();

window.addEventListener(
    "resize",
    resizeAimCanvas
);

function spawnTarget(){

    if(!running) return;

    targets.push({

        x:40 + Math.random()
        * (aimCanvas.width - 80),

        y:40 + Math.random()
        * (aimCanvas.height - 80),

        r:22,

        born:Date.now()
    });
}

function drawAim(){

    aimCtx.clearRect(
        0,
        0,
        aimCanvas.width,
        aimCanvas.height
    );

    for(const t of targets){

        aimCtx.beginPath();

        aimCtx.arc(
            t.x,
            t.y,
            t.r,
            0,
            Math.PI * 2
        );

        aimCtx.fillStyle =
        "#3b82f6";

        aimCtx.fill();

        aimCtx.beginPath();

        aimCtx.arc(
            t.x,
            t.y,
            8,
            0,
            Math.PI * 2
        );

        aimCtx.fillStyle =
        "white";

        aimCtx.fill();
    }

    requestAnimationFrame(
        drawAim
    );
}

drawAim();

aimCanvas.addEventListener(
    "click",
    e=>{

        if(!running) return;

        const rect =
        aimCanvas
        .getBoundingClientRect();

        const x =
        e.clientX - rect.left;

        const y =
        e.clientY - rect.top;

        targets =
        targets.filter(t=>{

            const dx = x - t.x;
            const dy = y - t.y;

            return Math.sqrt(
                dx*dx + dy*dy
            ) > t.r;
        });
    }
);

function startAimTrainer(){

    targets = [];

    running = true;

    const interval =
    setInterval(
        spawnTarget,
        700
    );

    setTimeout(()=>{

        clearInterval(interval);

        running = false;

    },15000);
}

/* DOTS */

const bg =
document.getElementById(
    "bgDots"
);

const bgCtx =
bg.getContext("2d");

function resizeBG(){

    bg.width =
    window.innerWidth;

    bg.height =
    window.innerHeight;
}

resizeBG();

window.addEventListener(
    "resize",
    resizeBG
);

const dots = [];

for(
    let x=0;
    x<window.innerWidth;
    x+=24
){

    for(
        let y=0;
        y<window.innerHeight;
        y+=24
    ){

        dots.push({
            x,y
        });
    }
}

function animateDots(){

    bgCtx.clearRect(
        0,
        0,
        bg.width,
        bg.height
    );

    for(const d of dots){

        bgCtx.beginPath();

        bgCtx.arc(
            d.x,
            d.y,
            1.4,
            0,
            Math.PI * 2
        );

        bgCtx.fillStyle =
        "rgba(255,255,255,.2)";

        bgCtx.fill();
    }

    requestAnimationFrame(
        animateDots
    );
}

animateDots();

</script>

</body>
</html>
