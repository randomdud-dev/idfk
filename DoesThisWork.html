
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>System Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
    overflow-x:hidden;
}

#bgDots{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-1;
    pointer-events:none;
}

.container{
    position:relative;
    z-index:1;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

#topTab{
    display:flex;
    gap:10px;
    padding:20px;
    position:sticky;
    top:0;
    z-index:10;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
}

button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:.2s;
}

button:hover{
    background:#3b82f6;
    transform:translateY(-2px);
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:18px;
    padding:20px;
    backdrop-filter:blur(12px);
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.info-row{
    display:flex;
    justify-content:space-between;
    gap:20px;
    margin-bottom:12px;
}

.small{
    margin-top:10px;
    opacity:.7;
    font-size:.9rem;
}

iframe{
    width:100%;
    height:450px;
    border:none;
    border-radius:14px;
}

.hidden{
    opacity:0;
    transform:translateY(10px);
    pointer-events:none;
    position:absolute;
}

#humanSection{
    padding:20px;
}

#aimCanvas{
    width:100%;
    height:500px;
    background:rgba(0,0,0,0.25);
    border-radius:12px;
    margin-top:20px;
    cursor:crosshair;
    display:block;
}

h1,h2{
    margin-top:0;
}

</style>
</head>

<body>

<canvas id="bgDots"></canvas>

<div id="topTab">
    <button onclick="showSection('main')">SYSTEM</button>
    <button onclick="showSection('human')">HUMAN TEST</button>
</div>

<div class="container">

<h1>System Dashboard</h1>

<div class="grid">

<div class="card">
    <h2>System Information</h2>
    <div id="systemInfo">Loading...</div>
</div>

<div class="card">
    <h2>Location</h2>

    <div id="locationInfo">
        Detecting location...
    </div>

    <button onclick="getPreciseLocation()">
        Get Precise Location
    </button>

    <div class="small">
        Approximate location uses IP lookup.
    </div>
</div>

</div>

<div class="card" style="margin-top:20px">

<h2>Map</h2>

<div id="mapStatus"
style="margin-bottom:12px;opacity:.8;">
Location Source: UNKNOWN
</div>

<iframe id="map"></iframe>

</div>

</div>

<div id="humanSection" style="display:none;">

<div class="card">

<h2>Human Test</h2>

<button onclick="startReactionTest()">
Reaction Time Test
</button>

<button onclick="startAimTrainer()">
Aim Trainer
</button>

<div id="scoreBoard" style="margin-top:20px"></div>

<canvas id="aimCanvas"></canvas>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import { getAnalytics }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-analytics.js";

import {
    getFirestore,
    collection,
    addDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyD_50N3_eROrf2bPb7QaO7c5CNL4Z6JIsE",

    authDomain: "fire-store-2cc89.firebaseapp.com",

    projectId: "fire-store-2cc89",

    storageBucket: "fire-store-2cc89.firebasestorage.app",

    messagingSenderId: "816790071643",

    appId: "1:816790071643:web:99fd222f13e04b7d15d27e",

    measurementId: "G-CT2NXQFK3C"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);

const db = getFirestore(app);

const systemData = {};
window.systemData = systemData;

let systemReady = false;

async function saveTest(){

    if(localStorage.getItem("saved")) return;
    if(!systemReady) return;

    localStorage.setItem("saved", "true");

    try{

        await addDoc(
            collection(db, "visitors"),
            {
                ...systemData,
                time:new Date().toISOString()
            }
        );

    }catch(err){

        console.error(err);
        localStorage.removeItem("saved");
    }
}

document.addEventListener(
    "click",
    saveTest,
    { once:true }
);

function addRow(label, value){

    return `
    <div class="info-row">
        <span>${label}</span>
        <span>${value}</span>
    </div>
    `;
}

function detectOS(){

    const ua = navigator.userAgent;

    if(ua.includes("Windows")) return "Windows";
    if(ua.includes("Mac")) return "macOS";
    if(ua.includes("Linux")) return "Linux";
    if(ua.includes("Android")) return "Android";
    if(ua.includes("iPhone")) return "iPhone";

    return "Unknown";
}

async function loadSystemInfo(){

    let html = "";

    systemData.os = detectOS();
    systemData.userAgent = navigator.userAgent;
    systemData.platform = navigator.platform;

    html += addRow("OS", systemData.os);
    html += addRow("Platform", systemData.platform);
    html += addRow("Language", navigator.language);
    html += addRow("CPU Cores", navigator.hardwareConcurrency || "Unknown");
    html += addRow("Screen", `${screen.width}x${screen.height}`);

    document.getElementById("systemInfo").innerHTML = html;

    systemReady = true;
}

async function loadApproximateLocation(){

    const el =
    document.getElementById("locationInfo");

    try{

        const res =
        await fetch("https://ipapi.co/json");

        const data = await res.json();

        el.innerHTML = `
            City: ${data.city}<br>
            Region: ${data.region}<br>
            Country: ${data.country_name}<br>
            IP: ${data.ip}
        `;

        document.getElementById("map").src =
        `https://maps.google.com/maps?q=${data.latitude},${data.longitude}&z=12&output=embed`;

        document.getElementById("mapStatus").innerHTML =
        "Location Source: IP API";

    }catch{

        el.innerHTML = "Location failed";
    }
}

function getPreciseLocation(){

    if(!navigator.geolocation) return;

    navigator.geolocation.getCurrentPosition(pos=>{

        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        document.getElementById("locationInfo").innerHTML = `
            Latitude: ${lat}<br>
            Longitude: ${lon}
        `;

        document.getElementById("map").src =
        `https://maps.google.com/maps?q=${lat},${lon}&z=14&output=embed`;

        document.getElementById("mapStatus").innerHTML =
        "Location Source: GPS";

    });
}

window.getPreciseLocation = getPreciseLocation;

function showSection(mode){

    const system =
    document.querySelector(".container");

    const human =
    document.getElementById("humanSection");

    if(mode === "human"){

        system.classList.add("hidden");
        human.style.display = "block";
    }

    if(mode === "main"){

        human.style.display = "none";
        system.classList.remove("hidden");
    }
}

window.showSection = showSection;





/* REACTION TEST */

let reactionStart = 0;

function startReactionTest(){

    const board =
    document.getElementById("scoreBoard");

    board.innerHTML = `
    <div id="reactionBox"
    style="
        margin-top:20px;
        padding:60px;
        background:red;
        text-align:center;
        border-radius:12px;
        cursor:pointer;
        font-size:1.3rem;
        font-weight:bold;
    ">
        Wait for green...
    </div>
    `;

    const box =
    document.getElementById("reactionBox");

    const delay =
    1000 + Math.random() * 3000;

    setTimeout(()=>{

        box.style.background = "green";
        box.innerHTML = "CLICK!";

        reactionStart = Date.now();

        box.onclick = ()=>{

            const time =
            Date.now() - reactionStart;

            board.innerHTML = `
                Reaction Time:
                ${time} ms
            `;
        };

    }, delay);
}

window.startReactionTest =
startReactionTest;





/* AIM TRAINER */

const gameState = {

    hits:0,
    misses:0,
    totalClicks:0,
    reactionTimes:[]
};

let canvas;
let ctx;
let targets = [];

function initCanvas(){

    canvas =
    document.getElementById("aimCanvas");

    if(!canvas) return;

    ctx = canvas.getContext("2d");

    resize();

    window.addEventListener(
        "resize",
        resize
    );

    canvas.addEventListener(
        "click",
        onClick
    );

    loop();
}

function resize(){

    if(!canvas) return;

    canvas.width =
    canvas.clientWidth;

    canvas.height =
    canvas.clientHeight;
}

function spawnTarget(){

    targets.push({

        x:Math.random() * canvas.width,

        y:Math.random() * canvas.height,

        r:18,

        life:2000,

        created:Date.now()
    });
}

function onClick(e){

    const rect =
    canvas.getBoundingClientRect();

    const x =
    e.clientX - rect.left;

    const y =
    e.clientY - rect.top;

    gameState.totalClicks++;

    let hit = false;

    for(let i=0;i<targets.length;i++){

        const t = targets[i];

        const dx = x - t.x;
        const dy = y - t.y;

        if(Math.sqrt(dx*dx + dy*dy) < t.r){

            gameState.hits++;

            gameState.reactionTimes.push(
                Date.now() - t.created
            );

            targets.splice(i,1);

            hit = true;

            break;
        }
    }

    if(!hit){
        gameState.misses++;
    }
}

function loop(){

    if(!ctx || !canvas){

        requestAnimationFrame(loop);
        return;
    }

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const now = Date.now();

    targets =
    targets.filter(
        t => now - t.created < t.life
    );

    for(const t of targets){

        const age =
        (now - t.created) / t.life;

        ctx.beginPath();

        ctx.arc(
            t.x,
            t.y,
            t.r,
            0,
            Math.PI * 2
        );

        ctx.fillStyle =
        `rgba(30,120,255,${1-age})`;

        ctx.fill();
    }

    requestAnimationFrame(loop);
}

function startAimTrainer(){

    gameState.hits = 0;
    gameState.misses = 0;
    gameState.totalClicks = 0;
    gameState.reactionTimes = [];

    targets = [];

    const interval =
    setInterval(spawnTarget, 600);

    setTimeout(()=>{

        clearInterval(interval);

        showResults();

    },15000);
}

function showResults(){

    const avg =
    gameState.reactionTimes.length
    ?
    gameState.reactionTimes.reduce(
        (a,b)=>a+b
    ) / gameState.reactionTimes.length
    :
    0;

    document.getElementById(
        "scoreBoard"
    ).innerHTML = `

        Hits:
        ${gameState.hits}<br>

        Misses:
        ${gameState.misses}<br>

        Accuracy:
        ${(
            (gameState.hits /
            gameState.totalClicks) * 100 || 0
        ).toFixed(1)}%<br>

        Average:
        ${avg.toFixed(0)} ms
    `;
}

window.startAimTrainer =
startAimTrainer;

(async()=>{

    await loadSystemInfo();

    await loadApproximateLocation();

    await saveTest();

})();

window.addEventListener(
    "DOMContentLoaded",
    initCanvas
);

</script>

<script>

const canvasDots =
document.getElementById("bgDots");

const dotsCtx =
canvasDots.getContext("2d");

let mouseX = -9999;
let mouseY = -9999;

function resizeCanvas(){

    canvasDots.width =
    window.innerWidth;

    canvasDots.height =
    window.innerHeight;
}

resizeCanvas();

window.addEventListener(
    "resize",
    resizeCanvas
);

const spacing = 24;

const dots = [];

function buildDots(){

    dots.length = 0;

    for(
        let x = 0;
        x < canvasDots.width;
        x += spacing
    ){

        for(
            let y = 0;
            y < canvasDots.height;
            y += spacing
        ){

            dots.push({

                homeX:x,
                homeY:y,

                x:x,
                y:y,

                vx:0,
                vy:0
            });
        }
    }
}

buildDots();

window.addEventListener(
    "resize",
    buildDots
);

document.addEventListener(
    "mousemove",
    e=>{

        mouseX = e.clientX;
        mouseY = e.clientY;
    }
);

function animate(){

    dotsCtx.clearRect(
        0,
        0,
        canvasDots.width,
        canvasDots.height
    );

    for(const dot of dots){

        const dx = dot.x - mouseX;
        const dy = dot.y - mouseY;

        const distance =
        Math.sqrt(dx*dx + dy*dy);

        const radius = 120;

        if(distance < radius){

            const force =
            (radius - distance) / radius;

            const angle =
            Math.atan2(dy, dx);

            dot.vx +=
            Math.cos(angle) *
            force * 2.5;

            dot.vy +=
            Math.sin(angle) *
            force * 2.5;
        }

        dot.vx +=
        (dot.homeX - dot.x) * 0.02;

        dot.vy +=
        (dot.homeY - dot.y) * 0.02;

        dot.vx *= 0.92;
        dot.vy *= 0.92;

        dot.x += dot.vx;
        dot.y += dot.vy;

        dotsCtx.beginPath();

        dotsCtx.arc(
            dot.x,
            dot.y,
            1.5,
            0,
            Math.PI * 2
        );

        dotsCtx.fillStyle =
        "rgba(255,255,255,0.25)";

        dotsCtx.fill();
    }

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
