
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>System Dashboard</title>

<style>

#bgDots{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-1;
    pointer-events:none;
}

.container{
    position:relative;
    z-index:1;
    max-width:1200px;
    margin:auto;
}

#humanSection {
    position: relative;
    z-index: 2;
}

#aimCanvas {
    width: 100%;
    height: 500px;
    background: rgba(0,0,0,0.2);
    border-radius: 12px;
    cursor: crosshair;
}

.hidden {
    opacity: 0;
    transform: translateY(10px);
    pointer-events: none;
}

#humanSection, .container {
    transition: opacity 0.3s ease, transform 0.3s ease;
}

</style>
</head>

<body>

<canvas id="bgDots"></canvas>

<div id="topTab">
    <button onclick="showSection('main')">SYSTEM</button>
    <button onclick="showSection('human')">HUMAN TEST</button>
</div>

<div class="container">

<h1>System Dashboard</h1>

<div class="grid">

<div class="card">
    <h2>System Information</h2>
    <div id="systemInfo">Loading...</div>
</div>

<div class="card">
    <h2>Location</h2>
    <div id="locationInfo">Detecting location...</div>

    <button onclick="getPreciseLocation()">
        Get Precise Location
    </button>

    <div class="small">
        Approximate location uses IP lookup.
    </div>
</div>

</div>

<div class="card" style="margin-top:20px">
    <h2>Map</h2>

  <div id="mapStatus"
     style="margin-bottom:12px;
            opacity:.8;
            font-size:.95rem;">
    Location Source: UNKNOWN
</div>

<iframe id="map"></iframe>

</div> 
</div> 

<div id="humanSection" style="display:none;">
    <div class="card" style="margin-top:20px">
        <h2>Human Test</h2>

        <button onclick="startReactionTest()">Reaction Time Test</button>
        <button onclick="startAimTrainer()">Aim Trainer</button>

        <div id="scoreBoard"></div>
    </div>
</div>

</body>

<script type="module">

const systemData = {};
let systemReady = false;

window.systemData = systemData;


import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-analytics.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyD_50N3_eROrf2bPb7QaO7c5CNL4Z6JIsE",
    authDomain: "fire-store-2cc89.firebaseapp.com",
    projectId: "fire-store-2cc89",
    storageBucket: "fire-store-2cc89.firebasestorage.app",
    messagingSenderId: "816790071643",
    appId: "1:816790071643:web:99fd222f13e04b7d15d27e",
    measurementId: "G-CT2NXQFK3C"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getFirestore(app);

async function saveTest() {

    if (localStorage.getItem("saved")) return;
    if (!systemReady) return; // IMPORTANT: prevents partial saves

    localStorage.setItem("saved", "true");

    try {
        await addDoc(collection(db, "visitors"), {
            ...systemData,
            time: new Date().toISOString()
        });

        console.log("Saved FULL system data to Firestore");

    } catch (err) {
        console.error("Firestore error:", err);
        localStorage.removeItem("saved");
    }
}

document.addEventListener(
    "click",
    saveTest,
    { once: true }
);

function addRow(label,value){
    return `
    <div class="info-row">
        <span>${label}</span>
        <span>${value}</span>
    </div>`;
}

async function loadSystemInfo() {

    let html = "";

    systemData.os = detectOS();
    html += addRow("Operating System", systemData.os);

    systemData.platform = navigator.platform || "Unknown";
    html += addRow("Platform", systemData.platform);

    systemData.userAgent = navigator.userAgent;
    html += addRow("User Agent", systemData.userAgent);

    systemData.language = navigator.language || "Unknown";
    html += addRow("Language", systemData.language);

    systemData.languages = navigator.languages || [];
    html += addRow("Languages", systemData.languages.join(", "));

    systemData.cpuThreads = navigator.hardwareConcurrency || null;
    html += addRow("CPU Threads", systemData.cpuThreads);

    systemData.memoryGB = navigator.deviceMemory || null;
    html += addRow("Memory (GB)", systemData.memoryGB);

    systemData.screen = {
        width: screen.width,
        height: screen.height,
        availWidth: screen.availWidth,
        availHeight: screen.availHeight
    };

    html += addRow(
        "Screen Resolution",
        `${screen.width} × ${screen.height}`
    );

    systemData.window = {
        width: window.innerWidth,
        height: window.innerHeight
    };

    html += addRow(
        "Window Size",
        `${window.innerWidth} × ${window.innerHeight}`
    );

    systemData.pixelRatio = window.devicePixelRatio;
    html += addRow("Pixel Ratio", systemData.pixelRatio);

    systemData.colorDepth = screen.colorDepth;
    html += addRow("Color Depth", systemData.colorDepth);

    systemData.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    html += addRow("Timezone", systemData.timezone);

    systemData.currentTime = new Date().toISOString();
    html += addRow("Current Time", systemData.currentTime);

    systemData.touchSupport = 'ontouchstart' in window;
    html += addRow("Touch Support", systemData.touchSupport ? "Yes" : "No");

    systemData.online = navigator.onLine;
    html += addRow("Online", systemData.online ? "Yes" : "No");

    systemData.cookies = navigator.cookieEnabled;
    html += addRow("Cookies Enabled", systemData.cookies ? "Yes" : "No");

    systemData.url = location.href;
    html += addRow("Current URL", systemData.url);

    systemData.referrer = document.referrer || "Direct Visit";
    html += addRow("Referrer", systemData.referrer);

        const gpu = getWebGLInfo();
    if (gpu) {
        systemData.gpu = gpu;
        html += addRow("GPU Vendor", gpu.vendor);
        html += addRow("GPU Renderer", gpu.renderer);
    }

       if ("connection" in navigator) {
        const c = navigator.connection;

        systemData.network = {
            type: c.effectiveType,
            downlink: c.downlink,
            rtt: c.rtt,
            saveData: c.saveData
        };

        html += addRow("Network Type", c.effectiveType || "Unknown");
    }

      if ("getBattery" in navigator) {
        try {
            const battery = await navigator.getBattery();

            systemData.battery = {
                level: battery.level,
                charging: battery.charging
            };

            html += addRow(
                "Battery",
                `${Math.round(battery.level * 100)}%`
            );

        } catch {}
    }

    document.getElementById("systemInfo").innerHTML = html;

    systemReady = true; 
}

  if("connection" in navigator){

        const c = navigator.connection;

        html += addRow(
            "Network Type",
            c.effectiveType || "Unknown"
        );

        html += addRow(
            "Downlink",
            c.downlink
                ? `${c.downlink} Mbps`
                : "Unknown"
        );

        html += addRow(
            "RTT",
            c.rtt
                ? `${c.rtt} ms`
                : "Unknown"
        );
    }

    if("getBattery" in navigator){

        try{

            const battery =
                await navigator.getBattery();

            html += addRow(
                "Battery",
                `${Math.round(
                    battery.level * 100
                )}%`
            );

            html += addRow(
                "Charging",
                battery.charging
                    ? "Yes"
                    : "No"
            );

        }catch{}
    }

    document.getElementById(
        "systemInfo"
    ).innerHTML = html;
}

function detectOS() {
    const ua = navigator.userAgent;

    if (ua.includes("Windows")) return "Windows";
    if (ua.includes("Mac")) return "macOS";
    if (ua.includes("Linux")) return "Linux";
    if (ua.includes("Android")) return "Android";
    if (ua.includes("iPhone") || ua.includes("iPad")) return "iOS";

    return "Unknown";
}

function getWebGLInfo() {

    try {

        const canvas = document.createElement("canvas");

        const gl =
            canvas.getContext("webgl") ||
            canvas.getContext("experimental-webgl");

        if (!gl) return null;

        const debugInfo =
            gl.getExtension(
                "WEBGL_debug_renderer_info"
            );

        if (!debugInfo) return null;

        return {
            vendor: gl.getParameter(
                debugInfo.UNMASKED_VENDOR_WEBGL
            ),
            renderer: gl.getParameter(
                debugInfo.UNMASKED_RENDERER_WEBGL
            )
        };

    } catch {

        return null;
    }
}

async function loadApproximateLocation(){

    const locationDiv =
        document.getElementById("locationInfo");

    const map =
        document.getElementById("map");

    try{

        let locationData = null;

        try{

            const response =
                await fetch("https://ipapi.co/json/");

            const data =
                await response.json();

            if(data.latitude && data.longitude){

                locationData = {
                    city:data.city,
                    region:data.region,
                    country:data.country_name,
                    lat:data.latitude,
                    lon:data.longitude,
                    ip:data.ip
                };
            }

        }catch(e){}

        if(!locationData){

            try{

                const response =
                    await fetch("https://ipwho.is/");

                const data =
                    await response.json();

                locationData = {
                    city:data.city,
                    region:data.region,
                    country:data.country,
                    lat:data.latitude,
                    lon:data.longitude,
                    ip:data.ip
                };

            }catch(e){}
        }

        if(!locationData){
            throw new Error("Location lookup failed");
        }

        locationDiv.innerHTML = `
            <strong>Approximate Location</strong><br><br>

            City: ${locationData.city || "Unknown"}<br>
            Region: ${locationData.region || "Unknown"}<br>
            Country: ${locationData.country || "Unknown"}<br>
            IP: ${locationData.ip || "Unknown"}<br><br>

            Latitude: ${locationData.lat}<br>
            Longitude: ${locationData.lon}
        `;

document.getElementById("mapStatus").innerHTML =
    "Location Source: Approximate (IP-Based)";

        map.src =
            `https://maps.google.com/maps?q=${locationData.lat},${locationData.lon}&z=11&output=embed`;

    }
    catch(error){

        console.error(error);

        locationDiv.innerHTML = `
            Unable to determine approximate location.<br><br>
            If you're opening this file directly from your computer,
            try running it from a local web server.
        `;
    }
}

function getPreciseLocation(){

    if(!navigator.geolocation){

        alert("Geolocation not supported.");

        return;
    }

    navigator.geolocation.getCurrentPosition(

        function(position){

            const lat =
                position.coords.latitude;

            const lon =
                position.coords.longitude;

            document.getElementById("locationInfo")
            .innerHTML = `
                <strong>Precise Location</strong><br><br>

                Latitude: ${lat}<br>
                Longitude: ${lon}
            `;

document.getElementById("mapStatus").innerHTML =
    "Location Source: Precise (GPS)";
            document.getElementById("map").src =

                `https://maps.google.com/maps?q=${lat},${lon}&z=15&output=embed`;

        },

        function(error){

            alert(
                "Location permission denied or unavailable."
            );
        }

    );
}

window.getPreciseLocation = getPreciseLocation;

const gameState = {
    mode: null,
    hits: 0,
    misses: 0,
    totalClicks: 0,
    reactionTimes: [],
    startTime: 0,
    target: null
};

(async () => {
    await loadSystemInfo();
    await loadApproximateLocation();

    await saveTest();
})();
    requestAnimationFrame(loop);
}

let canvas;
let ctx;
let targets = [];


function initCanvas() {
    canvas = document.getElementById("aimCanvas");
    if (!canvas) return;

    ctx = canvas.getContext("2d");

    resize();

    // IMPORTANT: attach events AFTER canvas exists
    canvas.addEventListener("click", onClick);

    loop();
}

function resize() {
    if (!canvas) return;

    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
}

window.addEventListener("resize", resize);

function onClick(e) {

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    gameState.totalClicks++;

    let hit = false;

    for (let i = 0; i < targets.length; i++) {
        const t = targets[i];
        const dx = x - t.x;
        const dy = y - t.y;

        if (Math.sqrt(dx*dx + dy*dy) < t.r) {
            gameState.hits++;
            gameState.reactionTimes.push(Date.now() - t.created);
            targets.splice(i, 1);
            hit = true;
            break;
        }
    }

    if (!hit) gameState.misses++;
}

function loop() {
   
if (!canvas || !ctx) {
    requestAnimationFrame(loop);
    return;
}

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const now = Date.now();

    targets = targets.filter(t => now - t.created < t.life);

    for (const t of targets) {
        const age = (now - t.created) / t.life;

        ctx.beginPath();
        ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(30,120,255,${1 - age})`;
        ctx.fill();
    }

    requestAnimationFrame(loop);
}

window.addEventListener("DOMContentLoaded", initCanvas);

function spawnTarget() {
    if (!canvas) return;

    targets.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: 18,
        life: 2000,
        created: Date.now()
    });
}

function startAimTrainer() {
    gameState.hits = 0;
    gameState.misses = 0;
    gameState.totalClicks = 0;
    gameState.reactionTimes = [];

    targets = [];

    const interval = setInterval(spawnTarget, 600);

    setTimeout(() => {
        clearInterval(interval);
        showResults();
    }, 15000);
}

function showResults() {

    const avgReaction =
        gameState.reactionTimes.length
        ? gameState.reactionTimes.reduce((a,b)=>a+b)/gameState.reactionTimes.length
        : 0;

    document.getElementById("scoreBoard").innerHTML = `
        <h3>Results</h3>
        Hits: ${gameState.hits}<br>
        Misses: ${gameState.misses}<br>
        Accuracy: ${((gameState.hits / gameState.totalClicks) * 100 || 0).toFixed(1)}%<br>
        Avg Reaction: ${avgReaction.toFixed(0)}ms
    `;

    drawGraph();
    saveGameToFirebase(avgReaction);
}

function drawGraph() {
    const board = document.getElementById("scoreBoard");
    const data = gameState.reactionTimes.slice(-20);

    let html = "<h3>Reaction History</h3>";

    data.forEach(v => {
        html += `<div style="
            height:6px;
            width:${v/5}px;
            background:#2d7dff;
            margin:2px 0;
        "></div>`;
    });

    board.innerHTML = html;
}

function showSection(mode) {

    const system = document.querySelector(".container");
    const human = document.getElementById("humanSection");

    if (mode === "human") {
        system.classList.add("hidden");
        human.style.display = "block";
    }

    if (mode === "main") {
        human.style.display = "none";
        system.classList.remove("hidden");
    }
}

window.showSection = showSection;


</script>

<script>

console.log("Dot matrix script loaded");

const canvas = document.getElementById("bgDots");
const ctx = canvas.getContext("2d");

let mouseX = -9999;
let mouseY = -9999;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const spacing = 24;
const dots = [];

function buildDots() {

    dots.length = 0;

    for(let x = 0; x < canvas.width; x += spacing) {

        for(let y = 0; y < canvas.height; y += spacing) {

            dots.push({
                homeX: x,
                homeY: y,
                x: x,
                y: y,
                vx: 0,
                vy: 0
            });

        }
    }
}

buildDots();

window.addEventListener("resize", buildDots);

document.addEventListener("mousemove", e => {

    mouseX = e.clientX;
    mouseY = e.clientY;

});

document.addEventListener("mouseleave", () => {

    mouseX = -9999;
    mouseY = -9999;

});

function animate() {

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(const dot of dots) {

        const dx = dot.x - mouseX;
        const dy = dot.y - mouseY;

        const distance =
            Math.sqrt(dx * dx + dy * dy);

        const radius = 120;

        if(distance < radius) {

            const force =
                (radius - distance) / radius;

            const angle =
                Math.atan2(dy, dx);

            dot.vx +=
                Math.cos(angle) *
                force * 2.5;

            dot.vy +=
                Math.sin(angle) *
                force * 2.5;
        }

        dot.vx +=
            (dot.homeX - dot.x) * 0.02;

        dot.vy +=
            (dot.homeY - dot.y) * 0.02;

        dot.vx *= 0.92;
        dot.vy *= 0.92;

        dot.x += dot.vx;
        dot.y += dot.vy;

        ctx.beginPath();

        ctx.arc(
            dot.x,
            dot.y,
            1.5,
            0,
            Math.PI * 2
        );

        ctx.fillStyle =
            "rgba(255,255,255,0.25)";

        ctx.fill();
    }

    requestAnimationFrame(
        animate
    );
}

animate();

</script>

</body>
</html>
